{% extends "base.html" %}
{% block content %}
<div class="page-header session-detail-header">
  <h2>Session: {{ session_id }}</h2>
  <div class="header-actions">
    <a href="/sessions" class="btn btn-sm">← Back</a>
    <a href="/sessions/{{ session_id }}/export?format=md" class="btn btn-sm">Export MD</a>
    <a href="/sessions/{{ session_id }}/export?format=json" class="btn btn-sm">Export JSON</a>
    <button class="btn btn-sm" onclick="forkSession('{{ session_id }}')">Fork</button>
    <button class="btn btn-sm btn-danger" onclick="deleteSession('{{ session_id }}')">Delete</button>
  </div>
</div>

<div class="chat-messages">
  {% for turn in history %}
  <div class="msg {{ turn.role }}">
    <span class="role">{{ turn.role }}</span>
    <div class="content">{{ turn.content }}</div>
  </div>
  {% endfor %}
  {% if not history %}
  <div class="msg system"><div class="content">No turns in this session.</div></div>
  {% endif %}
</div>

<script>
async function forkSession(sid) {
  const resp = await fetch('/sessions/' + encodeURIComponent(sid) + '/fork', { method: 'POST' });
  const data = await resp.json();
  if (data.ok) window.location.href = '/sessions/' + encodeURIComponent(data.new_id);
  else alert(data.error);
}

function deleteSession(sid) {
  if (!confirm('Delete session "' + sid + '" and all its turns?')) return;
  fetch('/sessions/' + encodeURIComponent(sid) + '/delete', { method: 'POST' })
    .then(() => window.location.href = '/sessions');
}
</script>
{% endblock %}
